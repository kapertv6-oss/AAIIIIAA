<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hakka AI | ZZZ Style</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    :root { --neon-orange: #ff7b00; }
    body { background-color: #0b0d11; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
    .zzz-card { background: #14171d; border: 1px solid #1f2329; transition: 0.2s; cursor: pointer; }
    .zzz-card:active { transform: scale(0.92); border-color: var(--neon-orange); }
    .neon-text { color: var(--neon-orange); text-shadow: 0 0 8px rgba(255,123,0,0.4); }
    .neon-btn { background: var(--neon-orange); color: black; font-weight: 900; box-shadow: 0 0 15px rgba(255,123,0,0.3); }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .fade-in { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
    .typing-dot { width: 3px; height:3px; background: var(--neon-orange); border-radius:50%; display:inline-block; animation:bounce 1.4s infinite ease-in-out both; }
    @keyframes bounce { 0%,80%,100% {transform:translateY(0);} 40% {transform:translateY(-4px);} }
</style>
</head>
<body class="antialiased">

<!-- ГЛАВНЫЙ ЭКРАН -->
<div id="home-screen" class="h-screen flex flex-col p-4 overflow-y-auto">
    <header class="flex justify-between items-center mb-5">
        <h1 class="text-2xl font-black italic neon-text uppercase tracking-tighter">HAKKA AI</h1>
        <p class="text-[7px] text-slate-500 uppercase tracking-[0.4em]">Нейросеть нового поколения</p>
    </header>

    <div class="grid grid-cols-4 gap-2">
        <!-- Персонаж 1 -->
        <div class="zzz-card rounded-xl overflow-hidden" onclick="selectCharacter('Макима','https://i.pinimg.com/236x/02/ab/cd/02abcd236.jpg')">
            <img src="https://i.pinimg.com/236x/02/ab/cd/02abcd236.jpg" class="aspect-square object-cover opacity-80">
            <div class="p-1.5 absolute bottom-0 w-full bg-gradient-to-t from-black">
                <div class="font-black text-[10px] uppercase italic truncate leading-none">Макима</div>
            </div>
        </div>
        <!-- Персонаж 2 -->
        <div class="zzz-card rounded-xl overflow-hidden" onclick="selectCharacter('Риас Гремори','https://i.pinimg.com/236x/11/aa/bb/11aabb236.jpg')">
            <img src="https://i.pinimg.com/236x/11/aa/bb/11aabb236.jpg" class="aspect-square object-cover opacity-80">
            <div class="p-1.5 absolute bottom-0 w-full bg-gradient-to-t from-black">
                <div class="font-black text-[10px] uppercase italic truncate leading-none text-pink-500">Риас</div>
            </div>
        </div>
    </div>
</div>

<!-- ЧАТ -->
<div id="chat-screen" class="hidden fixed inset-0 flex flex-col bg-[#0b0d11] z-40">
    <div class="p-4 flex items-center gap-3 border-b border-white/5 bg-[#14171d]/95">
        <button onclick="exitChat()" class="neon-text text-3xl font-bold">❮</button>
        <div id="chat-avatar-header" class="w-9 h-9 rounded-full border border-orange-500/30 overflow-hidden"></div>
        <div id="chat-name-header" class="font-black text-[12px] italic uppercase"></div>
    </div>

    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4 hide-scroll"></div>

    <div class="p-4 bg-[#14171d]/90 border-t border-white/5 pb-10">
        <div class="flex gap-2">
            <input id="user-input" type="text" placeholder="Напиши что-нибудь..." class="flex-1 bg-black/50 border border-slate-800 rounded-2xl px-5 py-3 text-[11px] text-white outline-none focus:border-[#ff7b00]">
            <button onclick="handleSend()" class="neon-btn w-12 h-12 rounded-2xl flex items-center justify-center">🚀</button>
        </div>
    </div>
</div>

<script>
let currentActiveChar = {name:'', img:''};
let userAvatarUrl = "https://ui-avatars.com";

// Выбор персонажа → сразу чат
function selectCharacter(name,img){
    currentActiveChar={name,img};
    document.getElementById('home-screen').classList.add('hidden');
    document.getElementById('chat-screen').classList.remove('hidden');
    document.getElementById('chat-name-header').innerText=name;
    document.getElementById('chat-avatar-header').innerHTML=`<img src="${img}" class="w-full h-full object-cover">`;

    // Приветственное сообщение ИИ
    handleSendSystem(`Привет! Я ${name}. Чем займемся сегодня?`);
}

function exitChat(){
    document.getElementById('chat-screen').classList.add('hidden');
    document.getElementById('home-screen').classList.remove('hidden');
    document.getElementById('messages').innerHTML="";
}

// Стриминг ответа ИИ
async function handleSendSystem(text){
    const msgBox=document.getElementById('messages');
    const aiMsgId="ai-"+Date.now();
    msgBox.innerHTML+=`
        <div id="${aiMsgId}" class="flex items-start gap-2 fade-in">
            <img src="${currentActiveChar.img}" class="w-7 h-7 rounded-full border border-orange-500/30">
            <div class="bg-[#1a1d23] px-3 py-2 rounded-2xl rounded-tl-none border border-slate-800 min-w-[50px] text-[11px] leading-relaxed italic text-slate-200">
                <div class="flex gap-1.5 py-2"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>
            </div>
        </div>`;
    msgBox.scrollTo({top:msgBox.scrollHeight, behavior:'smooth'});

    try{
        const response=await fetch(`http://127.0.0.1:8000/chat-stream?message=${encodeURIComponent(text)}&character=${encodeURIComponent(currentActiveChar.name)}`);
        const reader=response.body.getReader();
        const decoder=new TextDecoder();
        const aiBubble=document.getElementById(aiMsgId).querySelector('div:last-child');
        aiBubble.innerHTML="";
        while(true){
            const {done,value}=await reader.read();
            if(done) break;
            aiBubble.innerText+=decoder.decode(value);
            msgBox.scrollTo({top:msgBox.scrollHeight, behavior:'auto'});
        }
    }catch(err){
        document.getElementById(aiMsgId).querySelector('div:last-child').innerHTML="Ошибка связи. Проверь бэкенд!";
    }
}

// Сообщение пользователя
async function handleSend(){
    const input=document.getElementById('user-input');
    const text=input.value.trim();
    if(!text) return;

    const msgBox=document.getElementById('messages');

    // Сообщение пользователя
    msgBox.innerHTML+=`
        <div class="flex items-start justify-end gap-2 fade-in">
            <div class="neon-btn px-3 py-2 rounded-2xl rounded-tr-none max-w-[75%] text-[11px] leading-relaxed shadow-md">${text}</div>
            <img src="${userAvatarUrl}" class="w-7 h-7 rounded-full border border-orange-500/50">
        </div>`;
    input.value="";
    msgBox.scrollTo({top:msgBox.scrollHeight, behavior:'smooth'});

    // Отправляем на сервер
    await handleSendSystem(text);
}

document.getElementById('user-input').addEventListener('keypress', (e)=>{if(e.key==='Enter') handleSend();});
</script>
</body>
</html>
